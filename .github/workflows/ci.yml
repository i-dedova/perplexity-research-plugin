name: Cross-Platform Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 22]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install playwright-cli
        run: npm install -g @playwright/cli@latest

      - name: Install alias
        shell: bash
        run: bash scripts/install-alias.sh

      - name: Run smoke tests
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          # Set PLUGIN_ROOT for tests to find the plugin
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          cd tests
          node smoke-test.js --ci

      - name: Verify alias wrapper
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          ppx-research --help
