name: Cross-Platform Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 22]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Get Playwright version
        id: pw-version
        shell: bash
        run: echo "version=$(npm view @playwright/cli version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Cache global npm packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/AppData/Roaming/npm
            ~/AppData/Roaming/npm-cache
          key: npm-global-${{ runner.os }}-node${{ matrix.node-version }}-${{ steps.pw-version.outputs.version }}

      - name: Install playwright-cli
        run: npm install -g @playwright/cli@latest

      - name: Install Chromium browser
        if: steps.cache-browsers.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install OS dependencies for Chromium
        if: runner.os == 'Linux'
        run: npx playwright install-deps chromium

      - name: Install alias
        shell: bash
        run: bash scripts/install-alias.sh

      - name: Run smoke tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          export CI=true
          cd tests
          xvfb-run --auto-servernum node smoke-test.js --ci

      - name: Run smoke tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          export CI=true
          cd tests
          node smoke-test.js --ci

      - name: Verify alias wrapper
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          ppx-research --help
