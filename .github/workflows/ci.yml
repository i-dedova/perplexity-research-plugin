name: Cross-Platform Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 22]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install playwright-cli
        run: npm install -g @playwright/cli@latest

      - name: Install Chromium browser with OS dependencies
        run: npx playwright install --with-deps chromium

      - name: Install alias
        shell: bash
        run: bash scripts/install-alias.sh

      - name: Run smoke tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          export CI=true
          cd tests
          xvfb-run --auto-servernum node smoke-test.js --ci

      - name: Run smoke tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          export CI=true
          cd tests
          node smoke-test.js --ci

      - name: Verify alias wrapper
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          ppx-research --help
