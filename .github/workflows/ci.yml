name: Cross-Platform Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 22]
        cli-version: ['latest']
        include:
          # Test minimum supported CLI version on one OS to keep CI fast
          - os: ubuntu-latest
            node-version: 22
            cli-version: '0.1.1'

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }} / CLI ${{ matrix.cli-version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install playwright-cli
        shell: bash
        run: npm install -g @playwright/cli@${{ matrix.cli-version }}

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: pw-cli-browsers-${{ runner.os }}-${{ matrix.cli-version }}-v2

      - name: Install browser for CLI
        if: steps.cache-browsers.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # CLI 0.1.5+ has install-browser; older versions use playwright install
          if playwright-cli install-browser --dry-run > /dev/null 2>&1; then
            playwright-cli install-browser --only-shell
          else
            npm install -g playwright@latest
            playwright install chromium
          fi

      - name: Install OS dependencies for Chromium
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Ensure playwright is available for install-deps
          npm list -g playwright > /dev/null 2>&1 || npm install -g playwright@latest
          playwright install-deps chromium

      - name: Install alias
        shell: bash
        run: bash scripts/install-alias.sh

      - name: Run smoke tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          export CI=true
          cd tests
          xvfb-run --auto-servernum node smoke-test.js --ci

      - name: Run smoke tests (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          export CI=true
          cd tests
          node smoke-test.js --ci

      - name: Verify alias wrapper
        shell: bash
        run: |
          export PATH="$HOME/.claude/bin:$PATH"
          export PERPLEXITY_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          ppx-research --help
